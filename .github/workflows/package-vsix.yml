name: Package VSIX

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (if any)
        run: npm install

      - name: Package extension (.vsix)
        run: npx --yes @vscode/vsce@3.3.0 package --out jsql-syntax.vsix --allow-star-activation --allow-missing-repository

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsql-syntax-vsix
          path: jsql-syntax.vsix
