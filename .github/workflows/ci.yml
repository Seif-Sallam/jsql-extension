name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate installer shell script
        run: bash -n scripts/install-extension.sh

      - name: Syntax-check extension entrypoints
        run: |
          node -c extension.js
          node -c src/extension.js
          node -c src/ui/welcome.js

      - name: Run test suite
        run: npm test

  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build VSIX
        id: package
        run: |
          VSIX_PATH="$(npm run --silent package:vsix)"
          if [ ! -f "${VSIX_PATH}" ]; then
            echo "Expected VSIX was not created: ${VSIX_PATH}" >&2
            exit 1
          fi
          echo "vsix_path=${VSIX_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsql-syntax-vsix
          path: ${{ steps.package.outputs.vsix_path }}
          if-no-files-found: error

