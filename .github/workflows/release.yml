name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match package.json version ${PACKAGE_VERSION}." >&2
            echo "Expected tag: ${EXPECTED_TAG}" >&2
            exit 1
          fi

      - name: Validate installer shell script
        run: bash -n scripts/install-extension.sh

      - name: Syntax-check extension entrypoints
        run: |
          node -c extension.js
          node -c src/extension.js
          node -c src/ui/welcome.js

      - name: Run test suite
        run: npm test

      - name: Build VSIX
        id: package
        run: |
          VSIX_PATH="$(npm run --silent package:vsix)"
          if [ ! -f "${VSIX_PATH}" ]; then
            echo "Expected VSIX was not created: ${VSIX_PATH}" >&2
            exit 1
          fi
          echo "vsix_path=${VSIX_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload release workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jsql-syntax-vsix-${{ env.RELEASE_TAG }}
          path: ${{ steps.package.outputs.vsix_path }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${{ steps.package.outputs.vsix_path }}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${{ steps.package.outputs.vsix_path }}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi
