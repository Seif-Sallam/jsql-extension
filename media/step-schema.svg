<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#282a36"/>

  <!-- Title -->
  <text x="400" y="40" font-family="sans-serif" font-size="18" fill="#f8f8f2" text-anchor="middle" font-weight="bold">Schema Sources</text>
  <text x="400" y="64" font-family="sans-serif" font-size="13" fill="#6272a4" text-anchor="middle">Name your SQLAlchemy model files — JSql parses tables and columns from them</text>

  <!-- File box -->
  <rect x="60" y="100" width="200" height="160" rx="8" fill="#1e1f29" stroke="#6272a4" stroke-width="1.5"/>
  <rect x="60" y="100" width="200" height="32" rx="8" fill="#44475a"/>
  <rect x="60" y="124" width="200" height="8" fill="#44475a"/>
  <text x="160" y="122" font-family="monospace" font-size="12" fill="#f8f8f2" text-anchor="middle">liblms/models/tables.py</text>
  <text x="75" y="158" font-family="monospace" font-size="11" fill="#8be9fd">class</text>
  <text x="120" y="158" font-family="monospace" font-size="11" fill="#50fa7b">User</text>
  <text x="155" y="158" font-family="monospace" font-size="11" fill="#f8f8f2">(Model):</text>
  <text x="75" y="178" font-family="monospace" font-size="11" fill="#f8f8f2">  __tablename__ =</text>
  <text x="75" y="196" font-family="monospace" font-size="11" fill="#f1fa8c">    'user'</text>
  <text x="75" y="216" font-family="monospace" font-size="11" fill="#f8f8f2">  id_user = Column(</text>
  <text x="75" y="234" font-family="monospace" font-size="11" fill="#ffb86c">    INT</text>
  <text x="75" y="252" font-family="monospace" font-size="11" fill="#f8f8f2">  )</text>

  <!-- Arrow -->
  <line x1="265" y1="180" x2="330" y2="180" stroke="#bd93f9" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bd93f9"/>
    </marker>
  </defs>
  <text x="297" y="168" font-family="sans-serif" font-size="10" fill="#bd93f9" text-anchor="middle">parses</text>

  <!-- Source box -->
  <rect x="330" y="120" width="160" height="120" rx="8" fill="#44475a" stroke="#bd93f9" stroke-width="2"/>
  <text x="410" y="146" font-family="sans-serif" font-size="13" fill="#bd93f9" text-anchor="middle" font-weight="bold">Source: "liblms"</text>
  <line x1="345" y1="155" x2="475" y2="155" stroke="#6272a4" stroke-width="1"/>
  <text x="360" y="174" font-family="monospace" font-size="11" fill="#f4c56e">user</text>
  <text x="360" y="192" font-family="monospace" font-size="11" fill="#f4c56e">user_contract</text>
  <text x="360" y="210" font-family="monospace" font-size="11" fill="#f4c56e">task</text>
  <text x="360" y="228" font-family="monospace" font-size="11" fill="#6272a4">+ 661 more…</text>

  <!-- Arrow 2 -->
  <line x1="495" y1="180" x2="555" y2="180" stroke="#50fa7b" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#50fa7b"/>
    </marker>
  </defs>
  <text x="525" y="168" font-family="sans-serif" font-size="10" fill="#50fa7b" text-anchor="middle">powers</text>

  <!-- Features box -->
  <rect x="555" y="100" width="185" height="160" rx="8" fill="#1e1f29" stroke="#50fa7b" stroke-width="1.5"/>
  <text x="647" y="124" font-family="sans-serif" font-size="12" fill="#50fa7b" text-anchor="middle" font-weight="bold">Intelligence</text>
  <text x="572" y="148" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ Table name coloring</text>
  <text x="572" y="168" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ Column highlighting</text>
  <text x="572" y="188" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ Unknown table warnings</text>
  <text x="572" y="208" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ Hover documentation</text>
  <text x="572" y="228" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ F12 jump to definition</text>
  <text x="572" y="248" font-family="sans-serif" font-size="11" fill="#f8f8f2">✦ Column completions</text>

  <!-- Bottom hint -->
  <rect x="200" y="300" width="400" height="40" rx="6" fill="#44475a" opacity="0.6"/>
  <text x="400" y="325" font-family="sans-serif" font-size="12" fill="#f8f8f2" text-anchor="middle">Right-click any model file → <tspan fill="#8be9fd">JSql: Add to Schema Scope</tspan></text>
</svg>
