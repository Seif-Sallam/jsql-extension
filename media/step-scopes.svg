<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#282a36"/>
  <text x="400" y="40" font-family="sans-serif" font-size="18" fill="#f8f8f2" text-anchor="middle" font-weight="bold">Scope Prefixes</text>
  <text x="400" y="64" font-family="sans-serif" font-size="13" fill="#6272a4" text-anchor="middle">Map directories to schema sources — each service sees only its own tables</text>

  <!-- Workspace tree -->
  <rect x="40" y="90" width="220" height="240" rx="8" fill="#1e1f29" stroke="#6272a4" stroke-width="1"/>
  <rect x="40" y="90" width="220" height="28" rx="8" fill="#44475a"/>
  <rect x="40" y="110" width="220" height="8" fill="#44475a"/>
  <text x="150" y="109" font-family="monospace" font-size="11" fill="#f8f8f2" text-anchor="middle">workspace/</text>

  <text x="58" y="138" font-family="monospace" font-size="12" fill="#6272a4">📁</text>
  <text x="76" y="138" font-family="monospace" font-size="12" fill="#f4c56e">liblms/</text>
  <text x="76" y="158" font-family="monospace" font-size="11" fill="#6272a4">  └─ models/</text>
  <text x="76" y="176" font-family="monospace" font-size="11" fill="#50fa7b">       tables.py</text>

  <text x="58" y="204" font-family="monospace" font-size="12" fill="#6272a4">📁</text>
  <text x="76" y="204" font-family="monospace" font-size="12" fill="#5de3c0">applms/</text>
  <text x="76" y="224" font-family="monospace" font-size="11" fill="#6272a4">  └─ services/</text>
  <text x="76" y="242" font-family="monospace" font-size="11" fill="#f8f8f2">       queries.py ←</text>

  <text x="58" y="270" font-family="monospace" font-size="12" fill="#6272a4">📁</text>
  <text x="76" y="270" font-family="monospace" font-size="12" fill="#bd93f9">other_svc/</text>
  <text x="76" y="288" font-family="monospace" font-size="11" fill="#6272a4">  └─ repo/</text>
  <text x="76" y="306" font-family="monospace" font-size="11" fill="#f8f8f2">       db.py ←</text>

  <!-- Arrows and mappings -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5de3c0"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bd93f9"/>
    </marker>
  </defs>
  <path d="M 265 240 Q 340 240 370 220" stroke="#5de3c0" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <path d="M 265 302 Q 340 302 370 320" stroke="#bd93f9" stroke-width="1.5" fill="none" marker-end="url(#a2)"/>

  <!-- Mappings panel -->
  <rect x="370" y="90" width="390" height="240" rx="8" fill="#1e1f29" stroke="#44475a" stroke-width="1"/>
  <rect x="370" y="90" width="390" height="28" rx="8" fill="#44475a"/>
  <rect x="370" y="110" width="390" height="8" fill="#44475a"/>
  <text x="565" y="109" font-family="monospace" font-size="11" fill="#f8f8f2" text-anchor="middle">Prefix Mappings</text>

  <!-- Mapping 1 -->
  <rect x="385" y="130" width="360" height="50" rx="6" fill="#44475a" opacity="0.5"/>
  <text x="400" y="152" font-family="monospace" font-size="12" fill="#5de3c0">**/applms</text>
  <text x="520" y="152" font-family="monospace" font-size="12" fill="#6272a4"> → </text>
  <text x="550" y="152" font-family="monospace" font-size="12" fill="#f4c56e">liblms</text>
  <text x="400" y="170" font-family="sans-serif" font-size="10" fill="#6272a4">applms/* files see liblms tables only</text>

  <!-- Mapping 2 -->
  <rect x="385" y="192" width="360" height="50" rx="6" fill="#44475a" opacity="0.5"/>
  <text x="400" y="214" font-family="monospace" font-size="12" fill="#bd93f9">**/other_svc</text>
  <text x="530" y="214" font-family="monospace" font-size="12" fill="#6272a4"> → </text>
  <text x="562" y="214" font-family="monospace" font-size="12" fill="#f4c56e">liblms</text>
  <text x="400" y="232" font-family="sans-serif" font-size="10" fill="#6272a4">other_svc/* files see liblms tables only</text>

  <!-- Result hint -->
  <rect x="385" y="256" width="360" height="58" rx="6" fill="#282a36" stroke="#50fa7b" stroke-width="1"/>
  <text x="565" y="277" font-family="sans-serif" font-size="11" fill="#50fa7b" text-anchor="middle">Result: isolated schema per service</text>
  <text x="565" y="297" font-family="sans-serif" font-size="11" fill="#6272a4" text-anchor="middle">No cross-service table noise or false warnings</text>

  <text x="400" y="370" font-family="sans-serif" font-size="12" fill="#6272a4" text-anchor="middle">Right-click a folder → <tspan fill="#8be9fd">JSql: Add to Schema Scope</tspan> → Map as scope prefix</text>
</svg>
